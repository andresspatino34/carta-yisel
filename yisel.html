<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💖 Te quiero Yisel 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
overflow:hidden;
height:100vh;
font-family:Poppins,sans-serif;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
background: radial-gradient(circle at top,#ff4fa0,#6a00ff,#000);
color:white;
}

/* 🌌 fondo */
.glow{
position:absolute;
width:100%;
height:100%;
background: radial-gradient(circle at 20% 20%, rgba(255,255,255,0.15), transparent 40%),
            radial-gradient(circle at 80% 70%, rgba(53, 6, 33, 0.25), transparent 50%);
animation:move 8s infinite alternate;
}

@keyframes move{
from{transform:scale(1);}
to{transform:scale(1.2);}
}

/* 💌 tarjeta */
.card{
position:relative;
width:90%;
max-width:650px;
padding:30px;
border-radius:30px;
background:rgba(255,255,255,0.12);
backdrop-filter:blur(18px);
box-shadow:0 0 40px rgba(255,0,150,0.4);
border:1px solid rgba(255,255,255,0.2);
z-index:10;
}

/* 💖 título */
h1{
font-family:"Great Vibes";
font-size:3.5rem;
margin-bottom:10px;
text-shadow:0 0 20px #ff4fa0;
}

/* 🐥 emoji */
.bird{
font-size:70px;
animation:bounce 2s infinite;
}

@keyframes bounce{
50%{transform:translateY(-10px);}
}

/* 💌 texto */
p{
font-size:1.1rem;
line-height:1.6;
opacity:0.95;
}

/* ⏱ contador */
.counter{
margin-top:20px;
font-size:1.1rem;
color:#ffe6ff;
}

#time{
font-size:1.4rem;
margin-top:10px;
color:#fff7b2;
}

/* 💖 botón */
button{
margin-top:25px;
padding:15px 30px;
border:none;
border-radius:50px;
background:linear-gradient(90deg,#ff3ea5,#ff7ad9);
color:white;
font-size:1rem;
cursor:pointer;
box-shadow:0 0 20px #ff3ea5;
transition:0.3s;
}

button:active{
transform:scale(0.95);
}

/* 💖 corazones */
.heart{
position:fixed;
bottom:-20px;
font-size:22px;
animation:floatUp 4s linear forwards;
}

@keyframes floatUp{
to{
transform:translateY(-120vh);
opacity:0;
}
}

</style>
</head>

<body>

<div class="glow"></div>

<div class="card">

<div class="bird">🐥💞</div>

<h1>Te amo Yisel</h1>

<p>
Lo di todo con esto<br>
La cancion lo es todo, lo importante es que te amo<br>
(El emoji de pollito es porque me dio pereza cargar imagenes de Piolin)
</p>

<div class="counter">
Desde el 14 de junio y contando
<div id="time"></div>
</div>

<!-- 🎵 música -->
<audio id="music" loop>
  <source src="cancion.m4a" type="audio/mpeg">
</audio>

<!-- 💖 botón único -->
<button onclick="startEverything()">
💖 Tócame 💖
</button>

</div>

<script>

/* ⏱ contador */
const startDate = new Date("2026-06-14T00:00:00");

function update(){
let now = new Date();
let diff = now - startDate;

if(diff < 0){
document.getElementById("time").innerHTML = "Aún no llega ese momento 💖";
return;
}

let days = Math.floor(diff / (1000*60*60*24));
let hours = Math.floor((diff / (1000*60*60)) % 24);
let minutes = Math.floor((diff / (1000*60)) % 60);
let seconds = Math.floor((diff / 1000) % 60);

document.getElementById("time").innerHTML =
`${days} días · ${hours}h ${minutes}m ${seconds}s`;
}

setInterval(update,1000);
update();

/* 💖 todo en un solo botón */
function startEverything(){

// 🎵 música
const music = document.getElementById("music");
music.play();

// 💖 corazones
for(let i=0;i<20;i++){
let h = document.createElement("div");
h.className = "heart";
h.innerHTML = "💖";
h.style.left = Math.random()*100 + "vw";
h.style.fontSize = (18 + Math.random()*25) + "px";
h.style.animationDuration = (2 + Math.random()*3) + "s";
document.body.appendChild(h);

setTimeout(()=>h.remove(),4000);
}

}

</script>

</body>
</html>
